spring:
    application:
        name: "jexis-backend"
    datasource:
        url: jdbc:postgresql://localhost:5432/jexis
        username: postgres
        password: postgres
    jpa:
        hibernate:
            ddl-auto: update # create | update | validate | none
        show-sql: true
        properties:
            hibernate:
                format_sql: true

server:
    port: 3000
    servlet:
        context-path: /api

jwt:
    secret:
        access: acce-secret-key-here-at-least-32-chars-long
        refresh: refr-secret-key-here-at-least-32-chars-long
